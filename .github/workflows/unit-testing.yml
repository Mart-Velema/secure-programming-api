name: Unit-Testing

on:
  workflow_dispatch:
  push:
    branches:
      - feat/ci-cd
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: run linter
        uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: installing go packages
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
