name: Publish

on:
  push:
    branches:
      - feat/ci-cd
  release:
    types:
      - published
      - released
  create:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: installing go packages
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Run go tests
        run: go test ./...
      - name: Build package
        run: |
          GIN_MODE=release go build -C ./src -ldflags="-X main.Version=${{ github.ref_name }}" -v -o ~/gt
          GIN_MODE=release CGO_ENABLED=1 go build -C ./src -ldflags="-X main.Version=${{ github.ref_name }}" -v -o ~/gt-fat
      - name: Publish standard package
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-gt-latest
          path: ~/gt
          if-no-files-found: error
          retention-days: 30
          archive: false
          overwrite: true
      - name: Publish static package
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64-gt-fat-latest
          path: ~/gt-fat
          if-no-files-found: error
          retention-days: 30
          archive: false
          overwrite: true